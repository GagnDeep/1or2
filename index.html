<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1or2 - Settle it.</title>
  <meta name="description" content="A beautiful serverless poll platform. Create and share polls instantly.">
  <meta name="theme-color" content="#FAF4E8">
  <meta property="og:title" content="1or2 - Settle it.">
  <meta property="og:description" content="A beautiful serverless poll platform. Create and share polls instantly.">
  <meta property="og:image" content="https://1or2.com/og-image.png">
  <meta property="og:url" content="https://1or2.com/">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="1or2 - Settle it.">
  <meta name="twitter:description" content="A beautiful serverless poll platform. Create and share polls instantly.">
  <meta name="twitter:image" content="https://1or2.com/og-image.png">
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,600;9..144,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #FAF4E8;
      --ink: #181511;
      --red: #D9442A;
      --blue: #1F4FA8;
      --font-display: 'Fraunces', serif;
      --font-body: 'Archivo', sans-serif;
      --border-width: 2px;
      --border-radius: 4px;
      --hard-shadow: 4px 4px 0px var(--ink);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-body);
      background-color: var(--bg-color);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
    }
    .app-header {
      border-bottom: var(--border-width) solid var(--ink);
      background-color: var(--bg-color);
    }
    .header-inner {
      max-width: 1200px; margin: 0 auto; padding: 1rem;
      display: flex; justify-content: space-between; align-items: center;
    }
    .logo {
      font-family: var(--font-display); font-weight: 700; font-size: 1.5rem;
      text-transform: uppercase; color: var(--ink); text-decoration: none;
    }
    .main-nav { display: flex; gap: 1.5rem; align-items: center; }
    .nav-link { font-weight: 600; text-transform: uppercase; text-decoration: none; color: var(--ink); }
    .container { max-width: 800px; margin: 0 auto; padding: 2rem 1rem; }
    .text-center { text-align: center; }
    .display-text { font-family: var(--font-display); font-weight: 600; }
  </style>
  <link rel="stylesheet" href="css/style.css" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="css/style.css"></noscript>
</head>
<body>

  <!-- Minimal header for navigation -->
  <header class="app-header">
    <div class="header-inner">
      <a href="#/" class="logo">1or2</a>
      <nav class="main-nav">
        <a href="#/decks" class="nav-link">Play</a>
        <a href="#/create" class="nav-link create-btn">Create</a>
        <a href="#/mine" class="nav-link">Mine</a>
      </nav>
    </div>
  </header>

  <div id="app"></div>

  <!-- Toast Container for Notifications -->
  <div id="toast-container" aria-live="polite"></div>

  <script src="js/app.js" type="module"></script>
</body>
</html>
